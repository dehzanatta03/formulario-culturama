<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <form action="" method="get">
            <fieldset>
            <!-- DADOS PESSOAIS -->

            <legend>Dados Pessoais</legend>

            <label for="userName">Nome</label>
            <input type="text" name="userName" required>
            <br>

            <label for="userAge">Idade</label>
            <input type="number" name="userAge" min="12" max="100" required>
            <br>

            <label for="userBirthDate">Data de Nascimento</label>
            <input type="date" name="userBirthDate">
            <br>

            <label for="userEmail">E-mail</label>
            <input type="email" name="userEmail" required>
            <br>
            
            <label for="userPhoneNumber">Telefone</label>
            <input type="tel" name="userPhoneNumber" pattern="[0-9] {11}" placeholder="DDD + Número sem espaço ou hífen">
            <br>

            <label for="userPhoto">Upload de Foto</label>
            <input type="file" name="userPhoto" accept="image/*">
            <br>

            </fieldset>

            <fieldset>    

            <legend>Perfil</legend>
            <!-- PERFIL -->

            <p>Gênero</p>
            <input type="radio" name="userGender" value="Feminino">
            <label for="userGender">Feminino</label>

            <input type="radio" name="userGender" value="Masculino">
            <label for="userGender">Masculino</label>

            <input type="radio" name="userGender" value="notInformed">
            <label for="userGender">Prefiro não informar</label>
            <br>

            <label for="userMaritalStatus">Estado Civil</label>
            <select name="userMaritalStatus">
                <option value="notInformed">Selecione</option>
                <option value="solteiro">Solteiro(a)</option>
                <option value="casado">Casado(a)</option>
                <option value="divorciado">Divorciado(a)</option>
                <option value="viuvo">Viuvo(a)</option>
            </select>

            </fieldset>

            <button type="submit">Enviar</button>
        </form>
    </section>
    
</body>
</html>
