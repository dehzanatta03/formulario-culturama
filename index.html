<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="icon" href="culturama-favico.png">

    <title>Pesquisa Culturama</title>

</head>
<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <form action="" method="get">
            <fieldset>
            <!-- DADOS PESSOAIS -->

            <legend>Dados Pessoais</legend>

            <label for="name">Nome</label>
            <input id="name" type="text" name="userName" required>
            <br>

            <label for="age">Idade</label>
            <input id="age" type="number" name="userAge" min="12" max="100" required>
            <br>

            <label for="birthDate">Data de Nascimento</label>
            <input id="birthDate" type="date" name="userBirthDate">
            <br>

            <label for="email">E-mail</label>
            <input id="email" type="email" name="userEmail" required>
            <br>
            
            <label for="phoneNumber">Telefone</label>
            <input id="phoneNumber" type="tel" name="userPhoneNumber" pattern="[0-9] {11}" placeholder="DDD + Número sem espaço ou hífen">
            <br>

            <label for="photo">Upload de Foto</label>
            <input id="photo" type="file" name="userPhoto" accept="image/*">
            <br>

            </fieldset>

            <fieldset>    

            <legend>Perfil</legend>
            <!-- PERFIL -->

            <p>Gênero</p>
            <input id="female" type="radio" name="userGender" value="Feminino">
            <label for="female">Feminino</label>

            <input id="male" type="radio" name="userGender" value="Masculino">
            <label for="male">Masculino</label>

            <input id="notInformed" type="radio" name="userGender" value="notInformed">
            <label for="notInformed">Prefiro não informar</label>
            <br>

            <label for="maritalStatus">Estado Civil</label>
            <select id="maritalStatus" name="userMaritalStatus">
                <option value="notInformed">Selecione</option>
                <option value="solteiro">Solteiro(a)</option>
                <option value="casado">Casado(a)</option>
                <option value="divorciado">Divorciado(a)</option>
                <option value="viuvo">Viuvo(a)</option>
            </select>
            <br>

            <label for="state">Estado</label>
            <select id="state" name="userState" required>               
                <option value="notInformed">Selecione</option>
                <option value="acre">Acre</option>                   
                <option value="alagoas">Alagoas</option>
                <option value="amapa">Amapá</option>
                <option value="amazonas">Amazonas</option>
                <option value="bahia">Bahia</option>
                <option value="ceara">Ceará</option>
                <option value="distritoFederal">Distrito Federal</option>
                <option value="espiritoSanto">Espirito Santo</option>
                <option value="goias">Goiás</option>
                <option value="maranhao">Maranhão</option>
                <option value="matoGrossoDoSul">Mato Grosso do Sul</option>
                <option value="matoGrosso">Mato Grosso</option>
                <option value="minasGerais">Minas Gerais</option>
                <option value="para">Pará</option>
                <option value="paraiba">Paraíba</option>
                <option value="parana">Paraná</option>
                <option value="pernambuco">Pernambuco</option>
                <option value="piaui">Piauí</option>
                <option value="rioDeJaneiro">Rio de Janeiro</option>
                <option value="rioGrandeDoNorte">Rio Grande do Norte</option>
                <option value="rioGrandeDoSul">Rio Grande do Sul</option>
                <option value="rondonia">Rondônia</option>
                <option value="roraima">Roraima</option>
                <option value="santaCatarina">Santa Catarina</option>
                <option value="saoPaulo">São Paulo</option>
                <option value="sergipe">Sergipe</option>
                <option value="tocantins">Tocantins</option>
            </select>
            <br>

            <label for="city">Cidade</label>
            <input id="city" type="text" name="userCity" autocomplete="address-level2" placeholder="Ex. Fortaleza">

            </fieldset>

            <fieldset>

                <legend>Hábitos</legend>

                <input id="instagram" type="checkbox" name="userSocial" value="instagram">
                <label for="instagram">Instagram</label>
                <br>

                <input id="twitter" type="checkbox" name="userSocial" value="twitter">
                <label for="twitter">Twitter</label>
                <br>

                <input id="tiktok" type="checkbox" name="userSocial" value="tiktok">
                <label for="tiktok">TikTok</label>
                <br>

                <input id="linkedin" type="checkbox" name="userSocial" value="linkedin">
                <label for="linkedin">LinkedIn</label>
                <br>

                <label for="musicStyle">Estilo Musical</label>
                <input list="musicStyles" id="musicStyle" type="text" name="userMusicStyle">
                <datalist id="musicStyles">
                    <option value="Rock">
                    <option value="Pop">
                    <option value="Eletrônica">
                    <option value="Samba">
                    <option value="Reggae">
                </datalist>
                <br>

                <label for="favoriteColor">Cor Favorita</label>
                <input id="favoriteColor" type="color" name="userFavoriteColor">

            </fieldset>

            <fieldset>

                
                <legend>Opinião</legend>
                <p>O que você acha da qualidade do nosso serviço?</p>
                
                <input type="radio" id="otimo" name="userServiceOpinion" value="otima">
                <label for="otimo">Ótima</label><br>

                <input type="radio" id="boa" name="userServiceOpinion" value="boa">
                <label for="boa">Boa</label><br>

                <input type="radio" id="regular" name="userServiceOpinion" value="regular">
                <label for="regular">Regular</label><br>

                <input type="radio" id="ruim" name="userServiceOpinion" value="ruim">
                <label for="ruim">Ruim</label>
                <br>

                    <label for="comment">Escreva sua opinião:</label>
                    <textarea id="comment" name="userComment" placeholder="Digite aqui sua opinião..."></textarea>
                </fieldset>

            

            <button type="submit">Enviar</button>
        </form>
    </section>
    
</body>
</html>
